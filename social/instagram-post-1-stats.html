<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Instagram Post 1 — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;background:#0A1A11;display:flex;align-items:center;justify-content:center}
  .card{width:1080px;height:1080px;background:linear-gradient(160deg,#0A1A11 0%,#0F2117 50%,#0A1A11 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:80px}

  /* Grid pattern overlay */
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

  /* Top glow */
  .glow{position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none}

  /* Logo area */
  .logo{position:absolute;top:56px;left:80px;display:flex;align-items:center;gap:12px}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:#C9A84C}
  .logo-text{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:.1em;text-transform:uppercase}

  /* Handle */
  .handle{position:absolute;top:56px;right:80px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:500;color:rgba(255,255,255,0.35);letter-spacing:.06em}

  /* Main content */
  .main{display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:2}

  /* Big number */
  .big-num{font-family:'Cormorant Garamond',serif;font-size:118px;font-weight:700;line-height:1;color:#C9A84C;letter-spacing:-2px;text-shadow:0 0 80px rgba(201,168,76,0.3)}

  /* Currency label */
  .currency{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:500;color:rgba(201,168,76,0.6);letter-spacing:.15em;text-transform:uppercase;margin-top:4px;margin-bottom:40px}

  /* Divider */
  .divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);margin:0 auto 44px}

  /* Text lines */
  .line1{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:#FFFFFF;line-height:1.25;margin-bottom:16px}
  .line2{font-family:'DM Sans',sans-serif;font-size:21px;font-weight:400;color:rgba(255,255,255,0.55);line-height:1.5;max-width:680px;margin-bottom:48px}

  /* Zero block */
  .zero-wrap{display:flex;align-items:center;gap:24px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:24px 48px}
  .zero-num{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:700;color:rgba(255,255,255,0.15);line-height:1}
  .zero-label{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:rgba(255,255,255,0.4);text-align:left;line-height:1.5;text-transform:uppercase;letter-spacing:.08em}

  /* CTA */
  .cta{position:absolute;bottom:60px;display:flex;flex-direction:column;align-items:center;gap:10px}
  .cta-line{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#C9A84C;letter-spacing:.08em;text-transform:uppercase}
  .cta-sub{font-family:'DM Sans',sans-serif;font-size:15px;color:rgba(255,255,255,0.35)}

  /* Crescent decoration */
  .crescent{position:absolute;right:72px;bottom:120px;opacity:0.07}
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">AM Network</div>
  </div>
  <div class="handle">@amnet_io</div>

  <div class="main">
    <div class="big-num">$600B</div>
    <div class="currency">Zakat collected every year</div>
    <div class="divider"></div>
    <div class="line1">Transparent transactions: $0</div>
    <div class="line2">No confirmation. No report. No blockchain.<br>Not a single dollar is traceable.</div>
    <div class="zero-wrap">
      <div class="zero-num">0%</div>
      <div class="zero-label">Verified<br>Transparent<br>Traceable</div>
    </div>
  </div>

  <!-- Crescent SVG -->
  <svg class="crescent" width="180" height="180" viewBox="0 0 100 100" fill="white">
    <path d="M50 5 A45 45 0 1 1 49.9 5 A30 30 0 1 0 50 5 Z"/>
  </svg>

  <div class="cta">
    <div class="cta-line">We're changing that →</div>
    <div class="cta-sub">amnetwork.io · Join the waitlist</div>
  </div>
</div>
</body>
</html>
