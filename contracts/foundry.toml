[profile.default]
src = "."
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Run:  forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std
#       forge test -vvv
