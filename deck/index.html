<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AM Network — Investor Presentation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#B8952A;--gold2:#E8C547;--gold3:#F5E070;
  --green:#1B4D2E;--green2:#2A7A4B;--green3:#3CB46A;
  --bg:#060A08;--bg2:#0D1810;--bg3:#111D14;
  --text:#F4EFE1;--dim:#8A9B8E;--card:#121E15;
  --r:16px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}

/* ─── CANVAS PARTICLES ─── */
#cvs{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ─── TOPBAR ─── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 32px;
  background:linear-gradient(to bottom,rgba(6,10,8,.95),transparent);
}
.tl{display:flex;align-items:center;gap:10px}
.tl img{height:36px;width:auto}
#progress{
  display:flex;gap:6px;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.2);
  cursor:pointer;transition:all .3s;
}
.dot.on{background:var(--gold);transform:scale(1.3)}
#langbtn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:6px 14px;border-radius:20px;
  cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;
}
#langbtn:hover{background:rgba(255,255,255,.13)}

/* ─── SCENES ─── */
#stage{position:fixed;inset:0;overflow:hidden}
.scene{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 48px 60px;
  opacity:0;transform:scale(1.04);
  transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.scene.active{opacity:1;transform:scale(1);pointer-events:all}
.scene.past{opacity:0;transform:scale(.96)}

/* ─── ENTRANCE ANIMATION ─── */
.r{opacity:0;transform:translateY(28px);transition:opacity .6s,transform .6s}
.scene.active .r{opacity:1;transform:none}
.scene.active .r:nth-child(1){transition-delay:.1s}
.scene.active .r:nth-child(2){transition-delay:.22s}
.scene.active .r:nth-child(3){transition-delay:.34s}
.scene.active .r:nth-child(4){transition-delay:.46s}
.scene.active .r:nth-child(5){transition-delay:.58s}
.scene.active .r:nth-child(6){transition-delay:.7s}
.scene.active .r:nth-child(7){transition-delay:.82s}
.scene.active .r:nth-child(8){transition-delay:.94s}

/* ─── WORD ANIMATION ─── */
.words .w{
  display:inline-block;
  opacity:0;transform:translateY(16px);
  transition:opacity .5s,transform .5s;
  transition-delay:calc(var(--i)*.06s + .2s);
}
.scene.active .words .w{opacity:1;transform:none}

/* ─── TEXT STYLES ─── */
.tag{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.h1{font-size:clamp(2.4rem,5vw,4.2rem);font-weight:800;line-height:1.1;text-align:center;margin-bottom:20px}
.h2{font-size:clamp(1.6rem,3vw,2.6rem);font-weight:700;line-height:1.2;text-align:center;margin-bottom:16px}
.sub{font-size:clamp(1rem,1.8vw,1.3rem);color:var(--dim);text-align:center;max-width:680px;line-height:1.6;margin-bottom:28px}
.gold{color:var(--gold)}
.green{color:var(--green3)}

/* ─── CARDS ROW ─── */
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;width:100%;max-width:1100px}
.card{
  background:var(--card);border:1px solid rgba(184,149,42,.18);
  border-radius:var(--r);padding:28px 24px;flex:1;min-width:200px;max-width:320px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--green3));
}
.card-icon{font-size:2.4rem;margin-bottom:14px}
.card-title{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.card-text{font-size:.9rem;color:var(--dim);line-height:1.5}
.card-num{font-size:2.2rem;font-weight:900;color:var(--gold);margin-bottom:4px}

/* ─── STATS ROW ─── */
.stats{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.stat{text-align:center}
.stat-n{font-size:clamp(2rem,4vw,3.2rem);font-weight:900;color:var(--gold)}
.stat-l{font-size:.85rem;color:var(--dim);margin-top:4px}

/* ─── SCENE 0: COVER ─── */
#s0{background:radial-gradient(ellipse 120% 80% at 50% 40%,#0e2014 0%,var(--bg) 70%)}
.cover-logo{height:64px;width:auto;margin-bottom:32px;filter:drop-shadow(0 0 24px rgba(184,149,42,.4))}
.cover-title{font-size:clamp(3rem,7vw,5.5rem);font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:12px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--green3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cover-sub{font-size:clamp(1rem,2vw,1.4rem);color:var(--dim);margin-bottom:40px}
.cover-line{width:80px;height:3px;background:linear-gradient(90deg,var(--gold),var(--green3));border-radius:2px;margin:0 auto 40px}
.cover-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(184,149,42,.12);border:1px solid rgba(184,149,42,.3);
  border-radius:40px;padding:10px 24px;font-size:.95rem;color:var(--gold);
}

/* ─── SCENE 2: PROBLEM BIG NUMBER ─── */
.zero-wrap{position:relative;margin:20px 0}
.zero-n{
  font-size:clamp(8rem,22vw,18rem);font-weight:900;line-height:1;
  color:transparent;
  -webkit-text-stroke:3px var(--gold);
  text-shadow:0 0 80px rgba(184,149,42,.3);
}
.zero-label{font-size:clamp(1rem,2.5vw,1.6rem);color:var(--dim);text-align:center}

/* ─── SCENE 3: WHO NEEDS ZAKAT — SVG PEOPLE ─── */
.people-grid{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.person-card{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:20px 16px;width:160px;
  transition:transform .3s,border-color .3s;
}
.person-card:hover{transform:translateY(-6px);border-color:rgba(184,149,42,.3)}
.person-card svg{width:72px;height:90px}
.person-label{font-size:.82rem;color:var(--dim);text-align:center;line-height:1.4}
.stroke{stroke-dasharray:240;stroke-dashoffset:240;transition:stroke-dashoffset 1.2s ease}
.fillc{opacity:0;transition:opacity .8s .8s}
.scene.active .stroke{stroke-dashoffset:0}
.scene.active .fillc{opacity:.85}

/* ─── SCENE 4: WHAT ZAKAT SAVES FROM ─── */
.saves-grid{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.save-card{
  background:linear-gradient(135deg,rgba(27,77,46,.4),rgba(13,24,16,.6));
  border:1px solid rgba(60,180,106,.2);
  border-radius:18px;padding:28px 24px;flex:1;min-width:220px;max-width:300px;
  text-align:center;
}
.save-card svg{width:64px;height:64px;margin:0 auto 16px;display:block}
.save-title{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--gold)}
.save-text{font-size:.88rem;color:var(--dim);line-height:1.5}

/* ─── SCENE 5: SADAQAH SHIELD ─── */
.shield-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin:20px 0}
.shield-wrap svg{width:min(320px,70vw);height:auto}
.arrow-line{stroke-dasharray:80;stroke-dashoffset:80;animation:none}
.scene.active .arrow-line{animation:arrowIn 0.5s ease forwards}
@keyframes arrowIn{to{stroke-dashoffset:0}}
.a1{animation-delay:.4s!important}
.a2{animation-delay:.7s!important}
.a3{animation-delay:1s!important}
.shield-glow{
  filter:drop-shadow(0 0 20px rgba(184,149,42,.5));
}

/* ─── SCENE 6: MONEY FLOW ─── */
.flow-wrap{width:100%;max-width:700px;margin:0 auto}
.flow-wrap svg{width:100%;height:auto;overflow:visible}
.coin{opacity:0}
.scene.active .coin{opacity:1}
.flow-label{font-size:.85rem;font-weight:600;fill:var(--dim)}
.flow-title-txt{font-size:1rem;font-weight:700;fill:var(--text)}
.node-circle{
  filter:drop-shadow(0 0 12px rgba(184,149,42,.4));
}

/* ─── SCENE 7: MARKET ─── */
.chart-wrap{width:100%;max-width:600px;margin:16px auto}
.chart-wrap svg{width:100%;height:auto;overflow:visible}
.chart-line{
  stroke-dasharray:600;stroke-dashoffset:600;
  transition:stroke-dashoffset 2s ease .5s;
}
.scene.active .chart-line{stroke-dashoffset:0}
.chart-area{opacity:0;transition:opacity 1s ease 1.5s}
.scene.active .chart-area{opacity:1}
.mkt-stats{display:flex;gap:40px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* ─── SCENE 8: BUSINESS MODEL ─── */
.model-flow{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;max-width:900px;width:100%}
.mf-node{
  background:var(--card);border:1px solid rgba(184,149,42,.2);
  border-radius:14px;padding:20px 20px;text-align:center;
  min-width:140px;flex:1;max-width:180px;
}
.mf-node .icon{font-size:2rem;margin-bottom:8px}
.mf-node .lbl{font-size:.85rem;color:var(--dim);line-height:1.4}
.mf-arr{color:var(--gold);font-size:1.8rem;padding:0 8px;flex-shrink:0}
.fee-box{
  background:linear-gradient(135deg,rgba(184,149,42,.15),rgba(184,149,42,.05));
  border:1px solid rgba(184,149,42,.4);border-radius:20px;
  padding:20px 36px;text-align:center;margin-top:24px;
}
.fee-n{font-size:2.4rem;font-weight:900;color:var(--gold)}
.fee-l{font-size:.9rem;color:var(--dim)}

/* ─── SCENE 9: TRACTION ─── */
.traction-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:900px;width:100%}
.tr-card{
  background:var(--card);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:24px 20px;flex:1;min-width:180px;max-width:240px;text-align:center;
}
.tr-icon{font-size:1.8rem;margin-bottom:10px}
.tr-val{font-size:1.5rem;font-weight:800;color:var(--gold);margin-bottom:4px}
.tr-lbl{font-size:.82rem;color:var(--dim);line-height:1.4}
.check{color:var(--green3);font-weight:700}

/* ─── SCENE 10: ROADMAP ─── */
.road-wrap{display:flex;flex-direction:column;gap:0;max-width:560px;width:100%;position:relative;margin:8px auto}
.road-wrap::before{
  content:'';position:absolute;left:20px;top:10px;bottom:10px;width:2px;
  background:linear-gradient(to bottom,var(--gold),var(--green3));
  border-radius:1px;
}
.road-item{
  display:flex;gap:20px;align-items:flex-start;padding:12px 0;
  opacity:0;transform:translateX(-20px);
  transition:opacity .5s,transform .5s;
}
.scene.active .road-item{opacity:1;transform:none}
.scene.active .road-item:nth-child(1){transition-delay:.1s}
.scene.active .road-item:nth-child(2){transition-delay:.25s}
.scene.active .road-item:nth-child(3){transition-delay:.4s}
.scene.active .road-item:nth-child(4){transition-delay:.55s}
.scene.active .road-item:nth-child(5){transition-delay:.7s}
.road-dot{
  width:42px;height:42px;border-radius:50%;
  background:var(--card);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;color:var(--gold);
  flex-shrink:0;z-index:1;
}
.road-dot.done{background:var(--gold);color:var(--bg)}
.road-content{flex:1}
.road-phase{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.road-title{font-weight:700;margin-bottom:4px;font-size:1rem}
.road-desc{font-size:.82rem;color:var(--dim);line-height:1.4}

/* ─── SCENE 11: TEAM ─── */
.team-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;max-width:900px;width:100%}
.team-card{
  background:var(--card);border:1px solid rgba(255,255,255,.07);
  border-radius:18px;padding:28px 24px;flex:1;min-width:220px;max-width:260px;
  text-align:center;
}
.avatar{
  width:72px;height:72px;border-radius:50%;
  margin:0 auto 16px;overflow:hidden;
  background:linear-gradient(135deg,var(--green),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;font-weight:800;color:white;
  border:3px solid rgba(184,149,42,.3);
}
.team-name{font-weight:800;font-size:1.1rem;margin-bottom:4px}
.team-role{font-size:.85rem;color:var(--gold);margin-bottom:8px;font-weight:600}
.team-bio{font-size:.82rem;color:var(--dim);line-height:1.5}

/* ─── SCENE 12: THE ASK (DONUT) ─── */
.ask-wrap{display:flex;gap:48px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:900px;width:100%}
.donut-wrap{position:relative;flex-shrink:0}
.donut-wrap svg{width:240px;height:240px}
.donut-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
.donut-total{font-size:1.7rem;font-weight:900;color:var(--gold)}
.donut-sub{font-size:.8rem;color:var(--dim)}
.legend{display:flex;flex-direction:column;gap:12px;min-width:200px}
.leg-item{display:flex;align-items:center;gap:12px}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.leg-label{font-size:.88rem;flex:1;color:var(--dim)}
.leg-val{font-weight:700;color:var(--text);font-size:.95rem}

/* ─── SCENE 13: CLOSING ─── */
#s13{background:radial-gradient(ellipse 100% 100% at 50% 50%,#0e2014 0%,var(--bg) 65%)}
.close-logo{height:48px;width:auto;margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(184,149,42,.4))}
.close-q{
  font-size:clamp(1.2rem,2.5vw,1.8rem);font-style:italic;
  color:var(--dim);max-width:640px;text-align:center;line-height:1.6;
  margin-bottom:36px;
}
.close-contact{display:flex;flex-direction:column;gap:8px;align-items:center;margin-bottom:32px}
.close-contact a{color:var(--gold);text-decoration:none;font-size:1rem;transition:opacity .2s}
.close-contact a:hover{opacity:.7}
.close-cta{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#060A08;font-weight:800;font-size:1rem;
  padding:14px 32px;border-radius:40px;text-decoration:none;
  box-shadow:0 0 40px rgba(184,149,42,.35);
  transition:transform .2s,box-shadow .2s;
}
.close-cta:hover{transform:scale(1.03);box-shadow:0 0 60px rgba(184,149,42,.5)}

/* ─── NAV ARROWS ─── */
#nav-prev,#nav-next{
  position:fixed;top:50%;transform:translateY(-50%);
  z-index:90;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:50%;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.2rem;transition:all .2s;
  color:var(--text);
}
#nav-prev{left:16px}
#nav-next{right:16px}
#nav-prev:hover,#nav-next:hover{background:rgba(184,149,42,.2);border-color:var(--gold)}
#nav-prev.hidden,#nav-next.hidden{opacity:0;pointer-events:none}

/* ─── SLIDE COUNTER ─── */
#counter{
  position:fixed;bottom:20px;right:24px;
  font-size:.78rem;color:var(--dim);z-index:90;
  font-weight:600;letter-spacing:1px;
}

/* ─── SCENE BG DECORATIONS ─── */
.glow-orb{
  position:absolute;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(184,149,42,.1),transparent 70%);
}

/* ─── RESPONSIVE ─── */
@media(max-width:640px){
  .scene{padding:70px 20px 50px}
  .h1{font-size:2rem}
  .cover-title{font-size:3rem}
  .zero-n{font-size:10rem;-webkit-text-stroke:2px var(--gold)}
  .cards,.people-grid,.saves-grid,.model-flow,.team-grid,.ask-wrap{flex-direction:column;align-items:center}
  .mf-arr{transform:rotate(90deg)}
}
</style>
</head>

  // flow labels
  const fl = flowLabels[lang];
  ['fn1','fn2','fn3','fl1','fl2','fl3'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.textContent = fl[id];
  });
  // word animations
  makeWords(document.getElementById('ct0'), coverTitles[lang]);
  makeWords(document.getElementById('ct1'), scene1Titles[lang]);
  makeWords(document.getElementById('ct13'), closingTitles[lang]);
  // donut legend
  buildDonut(lang);
}

function toggleLang() {
  lang = lang==='en'?'ru':'en';
  document.getElementById('langbtn').textContent = lang==='en'?'RU':'EN';
  applyLang();
}

// ─── DONUT CHART ───
const circ = 2*Math.PI*90; // ~565.5
function buildDonut(l) {
  const data = donutData[l];
  const total = data.reduce((s,d)=>s+d.pct,0);
  let offset = 0;
  data.forEach((d,i)=>{
    const frac = d.pct/total;
    const arc = frac*circ;
    const el = document.getElementById('d'+i);
    if(!el) return;
    el.style.stroke = d.col;
    el.setAttribute('stroke-dashoffset', -offset);
    el.setAttribute('stroke-dasharray', arc+' '+(circ-arc));
    offset += arc;
  });
  // legend
  const leg = document.getElementById('donutLegend');
  leg.innerHTML = data.map(d=>`
    <div class="leg-item">
      <div class="leg-dot" style="background:${d.col}"></div>
      <div class="leg-label">${d.label}</div>
      <div class="leg-val">${d.val}</div>
    </div>
  `).join('');
}
function resetDonut() {
  for(let i=0;i<6;i++){
    const el=document.getElementById('d'+i);
    if(el){el.setAttribute('stroke-dasharray','0 565');el.setAttribute('stroke-dashoffset','0')}
  }
}
function animateDonut() {
  resetDonut();
  setTimeout(()=>buildDonut(lang),50);
}

// ─── SCENE NAVIGATION ───
function activate(n) {
  document.querySelectorAll('.scene').forEach((s,i)=>{
    s.classList.remove('active','past');
    if(i<n) s.classList.add('past');
  });
  document.querySelectorAll('.scene')[n].classList.add('active');

  // dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===n);
  });
  // counter
  document.getElementById('counter').textContent = (n+1)+' / '+TOTAL;
  // arrows
  document.getElementById('nav-prev').classList.toggle('hidden',n===0);
  document.getElementById('nav-next').classList.toggle('hidden',n===TOTAL-1);

  // special: donut
  if(n===12) setTimeout(animateDonut, 500);
  cur = n;
}

function go(dir) {
  const next = Math.max(0, Math.min(TOTAL-1, cur+dir));
  activate(next);
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});

// ─── MOUSE WHEEL ───
let wheelCD = false;
document.addEventListener('wheel', e=>{
  if(wheelCD) return;
  wheelCD = true;
  go(e.deltaY>0?1:-1);
  setTimeout(()=>wheelCD=false, 900);
},{passive:true});

// ─── TOUCH SWIPE ───
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){go(dx<0?1:-1)}else{go(dy<0?1:-1)}
});

// ─── DOTS ───
function buildDots() {
  const p = document.getElementById('progress');
  for(let i=0;i<TOTAL;i++){
    const d = document.createElement('div');
    d.className='dot';
    d.title='Scene '+(i+1);
    d.addEventListener('click',()=>activate(i));
    p.appendChild(d);
  }
}

// ─── CANVAS PARTICLES ───
(function(){
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  let W,H,parts=[];
  function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a)}
  for(let i=0;i<80;i++){
    parts.push({
      x:rand(0,W),y:rand(0,H),
      r:rand(1,3),
      vx:rand(-.2,.2),vy:rand(-.5,-.1),
      a:rand(.1,.5),
      col:Math.random()>.5?'184,149,42':'60,180,106'
    });
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    parts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-10){p.y=H+10;p.x=rand(0,W)}
      if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

// ─── INIT ───
buildDots();
applyLang();
activate(0);
</script>
</body>
